<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Redirecting…</title>

  <script>
    const params = window.location.hash || window.location.search;
    const deepLink = "lovable://login-callback" + params;
    window.location.href = deepLink;

    setTimeout(() => {
      document.body.innerHTML =
        "<h2>Opening the app...</h2><p>If nothing happens, open the Lovable app manually.</p>";
    }, 1500);
  </script>
</head>
<body></body>
</html>
