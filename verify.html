<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Email Verified</title>

<style>
  body {
    font-family: Arial, sans-serif;
    background: #f5f7fb;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
  }

  .card {
    background: white;
    padding: 40px;
    border-radius: 12px;
    text-align: center;
    box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    max-width: 400px;
  }

  h1 {
    color: #2ecc71;
  }

  p {
    color: #555;
  }

  button {
    margin-top: 20px;
    padding: 12px 20px;
    border: none;
    border-radius: 8px;
    background: #0066ff;
    color: white;
    font-size: 16px;
    cursor: pointer;
  }

  button:hover {
    background: #004ed6;
  }
</style>
</head>

<body>

<div class="card">
  <h1>✅ Email Verified</h1>
  <p>Your account has been successfully verified.</p>
  <p>You can now log in to the app.</p>

  <button onclick="openApp()">Open App</button>
</div>

<script>
  function openApp() {
    // Try opening mobile app
    window.location.href = "flutter://auth";

    // fallback → login website after 2 sec
    setTimeout(() => {
      window.location.href = "https://your-login-page.com";
    }, 2000);
  }
</script>

</body>
</html>
